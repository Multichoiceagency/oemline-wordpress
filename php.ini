; === OEMline WordPress Performance Configuration ===

; --- Upload & POST limits ---
upload_max_filesize = 200M
post_max_size = 200M

; --- Memory ---
memory_limit = 1024M

; --- Timeouts (generous to prevent 504s) ---
max_execution_time = 600
max_input_time = 600
default_socket_timeout = 600
max_input_vars = 10000

; --- OPcache (critical for performance) ---
opcache.enable = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 30000
opcache.revalidate_freq = 60
opcache.enable_cli = 1
opcache.save_comments = 1
; JIT disabled — causes segfaults in many Docker PHP builds
; opcache.jit = 1255
; opcache.jit_buffer_size = 128M

; --- Realpath cache (reduces filesystem calls) ---
realpath_cache_size = 4096k
realpath_cache_ttl = 600

; --- Session ---
session.gc_maxlifetime = 86400
session.cookie_lifetime = 86400

; --- Output buffering ---
output_buffering = 4096
zlib.output_compression = On

; --- Error logging (production) ---
display_errors = Off
log_errors = On
error_log = /var/log/php_errors.log
